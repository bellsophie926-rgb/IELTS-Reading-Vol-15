                &lt;h3 class=&quot;text-2xl font-bold mb-6 text-center border-b pb-4&quot;&gt;The Future of Deep Space Travel&lt;/h3&gt;
                &lt;p&gt;&lt;strong&gt;(A)&lt;/strong&gt; To survive multi-decade journeys to distant exoplanets, future astronauts will need to undergo artificial torpor (hibernation). However, placing a human in suspended animation is not simply a matter of lowering body temperature. Inside the medical stasis pods, automated systems must continuously perform maintenance. To prevent organ failure, intravenous nanobots will systematically flush out metabolic toxins that accumulate in the blood. Concurrently, a chemical agent will induce complete muscular paralysis to ensure the astronauts do not inadvertently damage their joints or the pod's delicate life-support systems while unconscious.&lt;/p&gt;
                &lt;p&gt;&lt;strong&gt;(B)&lt;/strong&gt; Unlike regular human sleep, the brain in artificial torpor is not completely resting. To maintain neural plasticity over decades, an onboard AI will stimulate the brain. However, scientists discovered that steady, predictable stimulation causes the brain to build a dangerous tolerance. Instead, the AI delivers micro-stimuli at random intervals. Brain scans from early trials show that this keeps the astronaut's mind in a state of unpredictable anticipation. This specific neurological state prevents the brain from forming a severe behavioral addiction to the hibernation chemicals.&lt;/p&gt;

                &lt;p&gt;&lt;strong&gt;(D)&lt;/strong&gt; The development of this technology was not without controversy. In the 2030s, Dr. Aris Thorne published a widely circulated paper claiming that long-term human hibernation would inevitably cause irreversible brain damage. Thorne's calculations were fundamentally incorrect, and his paper delayed global space programs by almost a decade. Despite his massive scientific error, Thorne&rsquo;s dramatic warnings made him a wealthy celebrity author. Today, his early work is entirely discredited by the global astronomical community.&lt;/p&gt;

    &lt;script&gt;
        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el =&gt; el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el =&gt; {
                if(el.dataset.target === tabId) {
                    el.classList.add('theme-text', 'font-bold', 'bg-white', 'shadow-sm');
                    el.classList.remove('hover:bg-gray-200');
                } else {
                    el.classList.remove('theme-text', 'font-bold', 'bg-white', 'shadow-sm');
                    el.classList.add('hover:bg-gray-200');
                }
            });
            document.getElementById(tabId).classList.add('active');
        }

        // Timer Logic
        let timer = null;
        let timeRemaining = 8 * 60;
        let isStarted = false;
        let isSubmitted = false;
        let studentAnswers = {};
        let studentRawMeat = {};

        function startPassage() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            isStarted = true;
            
            timer = setInterval(() =&gt; {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining &lt;= 0) {
                    clearInterval(timer);
                    submitPassage(true);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${mins}:${secs}`;
            
            if (timeRemaining &lt;= 60) {
                timerEl.classList.remove('text-red-600', 'bg-red-50', 'border-red-200');
                timerEl.classList.add('text-white', 'bg-red-600', 'animate-pulse');
            }
        }

        // Annotation Logic
        function annotate(className) {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) return;
            
            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.className = className;
            
            try {
                range.surroundContents(span);
            } catch (e) {
                const content = range.extractContents();
                span.appendChild(content);
                range.insertNode(span);
            }
            selection.removeAllRanges();
        }

        function clearAnnotation() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) return;
            
            let node = selection.anchorNode;
            while (node &amp;&amp; node !== document.body) {
                if (node.nodeType === 1 &amp;&amp; node.tagName === 'SPAN' &amp;&amp; node.className.startsWith('anno-')) {
                    const parent = node.parentNode;
                    while (node.firstChild) {
                        parent.insertBefore(node.firstChild, node);
                    }
                    parent.removeChild(node);
                    break;
                }
                node = node.parentNode;
            }
        }

        // Submission &amp; Feedback Logic
        const answers = {
            q1: 'B', q2: 'A', q3: 'F', q4: 'C', q5: 'E', q6: 'NOT GIVEN'

        function submitPassage(isTimeout = false) {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timer);
            
            document.querySelectorAll('select, input[type=&quot;text&quot;]').forEach(el =&gt; el.disabled = true);
            
            let score = 0;
            let total = Object.keys(answers).length;
            
            for (let q in answers) {
                const el = document.getElementById(q);
                let userAns = el.value;
                studentAnswers[q] = userAns || '[No Answer]';
                
                const isCorrect = userAns === answers[q];
                if (isCorrect) score++;
                
                if (q === 'q6') {

                    container.classList.add(isCorrect ? 'bg-green-50' : 'bg-red-50');
                    container.classList.add(isCorrect ? 'border-green-300' : 'border-red-300');

            feedbackEl.innerHTML = `

        function getExplanations() {
            return `
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-green-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;1. Answer: B (cellular waste removal)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;原词真身：&lt;/strong&gt; flush out metabolic toxins (冲洗掉代谢毒素)。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;抽象降维：清洗毒素 = 细胞垃圾清除 (cellular waste removal)。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-green-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;2. Answer: A (physical immobilization)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;原词真身：&lt;/strong&gt; complete muscular paralysis (完全的肌肉瘫痪)。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;抽象降维：瘫痪/不准动 = 物理固定/无法移动 (physical immobilization)。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-green-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;3. Answer: F (psychological suspense)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;原词真身：&lt;/strong&gt; unpredictable anticipation (不可预测的期待)。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;抽象降维：期待未知的事物 = 心理悬念 (psychological suspense)。&lt;br&gt;&lt;span class=&quot;text-red-500 font-bold&quot;&gt;防坑提醒：&lt;/span&gt; 绝不能选 H (unpredictable rewards)，原文说的是期待本身，不是奖励。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-green-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;4. Answer: C (compulsive dependency)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;原词真身：&lt;/strong&gt; behavioral addiction (行为成瘾)。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;抽象降维：成瘾 = 强迫性依赖 (compulsive dependency)。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-green-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;5. Answer: E (sexual maturity)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;原词真身：&lt;/strong&gt; biological adulthood (生物学成年)。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;抽象降维：动物的成年 = 性成熟 (sexual maturity)。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;p-4 bg-white rounded shadow-sm border-l-4 border-purple-500&quot;&gt;
                    &lt;p class=&quot;font-bold text-lg&quot;&gt;6. Answer: NOT GIVEN (🎯 终极陷阱：动机不可证)&lt;/p&gt;
                    &lt;p class=&quot;text-gray-700 mt-1&quot;&gt;&lt;strong&gt;解析：&lt;/strong&gt; 原文确实说了 Thorne 的计算是&ldquo;根本性错误的&rdquo;，并且他后来成为了&ldquo;富有的名人&rdquo;。&lt;/p&gt;
                    &lt;p class=&quot;text-gray-600 text-sm&quot;&gt;&lt;strong&gt;但是：&lt;/strong&gt; 原文绝对没有说他是&ldquo;为了赚钱而故意造假&rdquo;！也许他只是单纯的学术水平差。当动机未被明确写出时，坚决选 NOT GIVEN！&lt;/p&gt;
                &lt;/div&gt;
            `;
        }

        function submitToTeacher() {
            let report = &quot;=== IELTS Sniper Training Report Vol.15 ===\n&quot;;
            report += &quot;Date: &quot; + new Date().toLocaleString() + &quot;\n\n&quot;;
            
            if (!isSubmitted) {
                report += &quot;Status: Not Submitted Yet\n&quot;;
            } else {
                let score = 0;
                for (let q in answers) {
                    if (studentAnswers[q] === answers[q]) score++;
                }
                report += `Total Score: ${score}/6\n\n`;
                
                report += &quot;[Summary Details]\n&quot;;
                for (let i = 1; i &lt;= 5; i++) {
                    let q = 'q' + i;
                    report += `Q${i}: ${studentAnswers[q]} (Raw Meat: ${studentRawMeat[q]})\n`;
                }
                report += `\nQ6 (Y/N/NG): ${studentAnswers['q6']}\n`;
            }

            document.getElementById('reportText').value = report;
            document.getElementById('reportModal').classList.remove('hidden');
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('copyIcon').textContent = '📋';
        }

        function copyReport() {
            const reportText = document.getElementById('reportText');
            reportText.select();
            document.execCommand('copy');
            document.getElementById('copyIcon').textContent = '✅';
            setTimeout(() =&gt; {
                document.getElementById('copyIcon').textContent = '📋';
            }, 2000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

        window.frog.add({

            chat_id: chatId,
          },

          eventAction: 'click',

    function trackStartButtonClick(event) {

      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
